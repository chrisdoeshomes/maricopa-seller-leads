<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maricopa County – Motivated Seller Leads</title>
  <style>
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --accent:   #6366f1;
      --green:    #22c55e;
      --yellow:   #eab308;
      --red:      #ef4444;
      --orange:   #f97316;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    .badge {
      background: var(--accent);
      color: #fff;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .meta { color: var(--muted); font-size: 12px; margin-left: auto; }

    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar input, .toolbar select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 13px;
    }
    .toolbar input:focus, .toolbar select:focus {
      outline: 2px solid var(--accent);
    }
    .toolbar label { color: var(--muted); font-size: 12px; }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 7px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .btn:hover { opacity: 0.85; }
    .btn.outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .stats {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      min-width: 140px;
    }
    .stat-card .num { font-size: 28px; font-weight: 800; }
    .stat-card .lbl { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }

    .table-wrap {
      padding: 0 24px 24px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: var(--text); }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: var(--surface); }
    td { padding: 10px 12px; vertical-align: top; }

    .score-pill {
      display: inline-block;
      border-radius: 20px;
      padding: 2px 10px;
      font-weight: 700;
      font-size: 12px;
    }
    .score-high   { background: #166534; color: var(--green); }
    .score-med    { background: #713f12; color: var(--yellow); }
    .score-low    { background: #450a0a; color: var(--red); }

    .flag-chip {
      display: inline-block;
      background: #312e81;
      color: #a5b4fc;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      margin: 1px 2px 1px 0;
      white-space: nowrap;
    }
    .flag-chip.fc   { background: #450a0a; color: #fca5a5; }
    .flag-chip.tax  { background: #422006; color: #fdba74; }
    .flag-chip.jud  { background: #14532d; color: #86efac; }
    .flag-chip.prob { background: #1e1b4b; color: #c4b5fd; }
    .flag-chip.new  { background: #164e63; color: #67e8f9; }

    .type-badge {
      display: inline-block;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 700;
    }
    .cat-foreclosure  { background: #450a0a; color: #fca5a5; }
    .cat-judgment     { background: #14532d; color: #86efac; }
    .cat-tax_lien     { background: #422006; color: #fdba74; }
    .cat-lien         { background: #1e293b; color: #93c5fd; }
    .cat-probate      { background: #1e1b4b; color: #c4b5fd; }
    .cat-tax          { background: #422006; color: #fdba74; }
    .cat-release      { background: #134e4a; color: #5eead4; }
    .cat-construction { background: #1c1917; color: #d6d3d1; }

    a.doc-link { color: var(--accent); text-decoration: none; font-size: 11px; }
    a.doc-link:hover { text-decoration: underline; }

    .empty {
      text-align: center;
      padding: 60px;
      color: var(--muted);
    }
    .pager {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 24px 16px;
      color: var(--muted);
      font-size: 12px;
    }
    .pager button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
    }
    .pager button:disabled { opacity: .4; cursor: default; }
  </style>
</head>
<body>

<header>
  <h1>🏠 Motivated Seller Leads</h1>
  <span class="badge" id="total-badge">0 leads</span>
  <span class="meta" id="meta-text">Loading…</span>
  <button class="btn outline" id="csv-btn" onclick="exportCSV()">⬇ Export CSV</button>
</header>

<div class="toolbar">
  <div>
    <label>Search owner / address</label><br>
    <input id="q" type="search" placeholder="Name, address, doc #…" oninput="applyFilters()" style="width:220px" />
  </div>
  <div>
    <label>Category</label><br>
    <select id="cat-filter" onchange="applyFilters()">
      <option value="">All categories</option>
      <option value="foreclosure">Foreclosure / Lis Pendens</option>
      <option value="judgment">Judgment</option>
      <option value="tax_lien">Tax / Federal Lien</option>
      <option value="lien">Property Lien</option>
      <option value="probate">Probate</option>
      <option value="tax">Tax Deed</option>
      <option value="release">Release LP</option>
      <option value="construction">NOC</option>
    </select>
  </div>
  <div>
    <label>Min Score</label><br>
    <input id="min-score" type="number" value="0" min="0" max="100" oninput="applyFilters()" style="width:80px" />
  </div>
  <div>
    <label>Has Address?</label><br>
    <select id="addr-filter" onchange="applyFilters()">
      <option value="">Any</option>
      <option value="yes">Yes</option>
      <option value="no">No</option>
    </select>
  </div>
  <div style="margin-left:auto">
    <label>&nbsp;</label><br>
    <span id="result-count" style="color:var(--muted)">— leads shown</span>
  </div>
</div>

<div class="stats">
  <div class="stat-card"><div class="num" id="s-total">—</div><div class="lbl">Total Leads</div></div>
  <div class="stat-card"><div class="num" id="s-addr">—</div><div class="lbl">With Address</div></div>
  <div class="stat-card"><div class="num" id="s-fc">—</div><div class="lbl">Foreclosure / LP</div></div>
  <div class="stat-card"><div class="num" id="s-jud">—</div><div class="lbl">Judgments</div></div>
  <div class="stat-card"><div class="num" id="s-tax">—</div><div class="lbl">Tax Liens</div></div>
  <div class="stat-card"><div class="num" id="s-high">—</div><div class="lbl">Score ≥ 70</div></div>
</div>

<div class="table-wrap">
  <table id="leads-table">
    <thead>
      <tr>
        <th onclick="sortBy('score')">Score ▾</th>
        <th onclick="sortBy('cat_label')">Type</th>
        <th onclick="sortBy('owner')">Owner / Grantor</th>
        <th onclick="sortBy('prop_address')">Property Address</th>
        <th onclick="sortBy('mail_address')">Mailing Address</th>
        <th onclick="sortBy('amount')">Amount</th>
        <th onclick="sortBy('filed')">Filed</th>
        <th>Flags</th>
        <th>Doc #</th>
      </tr>
    </thead>
    <tbody id="leads-body">
      <tr><td colspan="9" class="empty">Loading leads…</td></tr>
    </tbody>
  </table>
</div>

<div class="pager">
  <button id="prev-btn" onclick="prevPage()" disabled>‹ Prev</button>
  <span id="page-info">Page 1</span>
  <button id="next-btn" onclick="nextPage()">Next ›</button>
</div>

<script>
  let allRecords = [];
  let filtered   = [];
  let sortCol    = 'score';
  let sortAsc    = false;
  let page       = 1;
  const PAGE_SIZE = 50;

  async function load() {
    try {
      const r = await fetch('records.json?' + Date.now());
      const d = await r.json();
      allRecords = d.records || [];

      document.getElementById('meta-text').textContent =
        `Source: ${d.source || 'Maricopa County'}  |  ` +
        `Range: ${d.date_range?.start || '—'} → ${d.date_range?.end || '—'}  |  ` +
        `Updated: ${d.fetched_at ? new Date(d.fetched_at).toLocaleString() : '—'}`;

      updateStats(d);
      applyFilters();
    } catch(e) {
      document.getElementById('leads-body').innerHTML =
        '<tr><td colspan="9" class="empty">⚠ Could not load records.json — run the scraper first.</td></tr>';
    }
  }

  function updateStats(d) {
    document.getElementById('s-total').textContent = d.total || 0;
    document.getElementById('s-addr').textContent  = d.with_address || 0;
    document.getElementById('s-fc').textContent    = allRecords.filter(r => r.cat === 'foreclosure').length;
    document.getElementById('s-jud').textContent   = allRecords.filter(r => r.cat === 'judgment').length;
    document.getElementById('s-tax').textContent   = allRecords.filter(r => r.cat === 'tax_lien' || r.cat === 'tax').length;
    document.getElementById('s-high').textContent  = allRecords.filter(r => r.score >= 70).length;
    document.getElementById('total-badge').textContent = (d.total || 0) + ' leads';
  }

  function applyFilters() {
    const q        = document.getElementById('q').value.toLowerCase();
    const cat      = document.getElementById('cat-filter').value;
    const minScore = parseInt(document.getElementById('min-score').value) || 0;
    const addrF    = document.getElementById('addr-filter').value;

    filtered = allRecords.filter(r => {
      if (cat && r.cat !== cat) return false;
      if (r.score < minScore) return false;
      if (addrF === 'yes' && !r.prop_address) return false;
      if (addrF === 'no'  &&  r.prop_address) return false;
      if (q) {
        const hay = [r.owner, r.prop_address, r.mail_address, r.doc_num, r.grantee, r.legal]
          .join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    // Sort
    filtered.sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (av == null) av = sortAsc ? '\uFFFF' : '';
      if (bv == null) bv = sortAsc ? '\uFFFF' : '';
      if (typeof av === 'number') return sortAsc ? av - bv : bv - av;
      return sortAsc
        ? String(av).localeCompare(String(bv))
        : String(bv).localeCompare(String(av));
    });

    page = 1;
    document.getElementById('result-count').textContent = filtered.length + ' leads shown';
    render();
  }

  function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = col !== 'score'; }
    applyFilters();
  }

  function render() {
    const start = (page - 1) * PAGE_SIZE;
    const rows  = filtered.slice(start, start + PAGE_SIZE);
    const tbody = document.getElementById('leads-body');

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="9" class="empty">No leads match your filters.</td></tr>';
      updatePager();
      return;
    }

    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${scorePill(r.score)}</td>
        <td><span class="type-badge cat-${r.cat}">${esc(r.cat_label)}</span></td>
        <td>${esc(r.owner)}<br><span style="color:var(--muted);font-size:11px">${esc(r.grantee)}</span></td>
        <td>
          ${r.prop_address ? esc(r.prop_address) + '<br><span style="color:var(--muted);font-size:11px">' + esc(r.prop_city) + ', ' + esc(r.prop_state) + ' ' + esc(r.prop_zip) + '</span>' : '<span style="color:var(--muted)">—</span>'}
        </td>
        <td>
          ${r.mail_address ? esc(r.mail_address) + '<br><span style="color:var(--muted);font-size:11px">' + esc(r.mail_city) + ', ' + esc(r.mail_state) + ' ' + esc(r.mail_zip) + '</span>' : '<span style="color:var(--muted)">—</span>'}
        </td>
        <td>${r.amount != null ? '$' + r.amount.toLocaleString() : '—'}</td>
        <td style="white-space:nowrap">${esc(r.filed) || '—'}</td>
        <td>${flagChips(r.flags)}</td>
        <td>
          ${r.clerk_url
            ? '<a class="doc-link" href="' + esc(r.clerk_url) + '" target="_blank">' + esc(r.doc_num || 'View') + '</a>'
            : esc(r.doc_num) || '—'}
        </td>
      </tr>
    `).join('');

    updatePager();
  }

  function scorePill(s) {
    const cls = s >= 70 ? 'score-high' : s >= 50 ? 'score-med' : 'score-low';
    return `<span class="score-pill ${cls}">${s}</span>`;
  }

  function flagChips(flags) {
    if (!flags || !flags.length) return '<span style="color:var(--muted)">—</span>';
    return flags.map(f => {
      let cls = '';
      if (f.includes('pendens') || f.includes('foreclos')) cls = 'fc';
      else if (f.includes('Tax') || f.includes('IRS'))     cls = 'tax';
      else if (f.includes('Judgment'))                      cls = 'jud';
      else if (f.includes('Probate'))                       cls = 'prob';
      else if (f.includes('New'))                           cls = 'new';
      return `<span class="flag-chip ${cls}">${esc(f)}</span>`;
    }).join('');
  }

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function updatePager() {
    const total = filtered.length;
    const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    document.getElementById('page-info').textContent = `Page ${page} of ${pages}`;
    document.getElementById('prev-btn').disabled = page <= 1;
    document.getElementById('next-btn').disabled = page >= pages;
  }

  function prevPage() { if (page > 1) { page--; render(); } }
  function nextPage() { const pages = Math.ceil(filtered.length / PAGE_SIZE); if (page < pages) { page++; render(); } }

  function exportCSV() {
    const cols = [
      'First Name','Last Name','Mailing Address','Mailing City','Mailing State','Mailing Zip',
      'Property Address','Property City','Property State','Property Zip',
      'Lead Type','Document Type','Date Filed','Document Number',
      'Amount/Debt Owed','Seller Score','Motivated Seller Flags','Source','Public Records URL'
    ];
    const rows = [cols.join(',')];
    filtered.forEach(r => {
      const nameParts = (r.owner||'').split(' ');
      const first = nameParts[0] || '';
      const last  = nameParts.slice(1).join(' ') || '';
      rows.push([
        first, last,
        r.mail_address, r.mail_city, r.mail_state||'AZ', r.mail_zip,
        r.prop_address, r.prop_city, r.prop_state||'AZ', r.prop_zip,
        r.cat_label, r.doc_type, r.filed, r.doc_num,
        r.amount||'', r.score, (r.flags||[]).join('; '),
        'Maricopa County Recorder', r.clerk_url
      ].map(v => '"' + String(v||'').replace(/"/g,'""') + '"').join(','));
    });
    const blob = new Blob([rows.join('\n')], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'motivated_sellers_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
  }

  load();
</script>
</body>
</html>
