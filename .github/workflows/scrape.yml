name: Scrape Motivated Seller Leads

on:
  schedule:
    # Run every day at 7:00 AM UTC (midnight AZ time in summer, 12am in winter)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to look back (default: 7)"
        required: false
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "scrape"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # ── Install Playwright browsers ────────────────────────────────────────
      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      # ── Run scraper ────────────────────────────────────────────────────────
      - name: Run scraper
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
        run: python scraper/fetch.py

      # ── Commit results ─────────────────────────────────────────────────────
      - name: Commit and push updated records
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dashboard/records.json data/records.json data/ghl_export.csv || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update leads $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

  # ── Deploy dashboard to GitHub Pages ────────────────────────────────────
  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
